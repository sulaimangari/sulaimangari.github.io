---
title: su.gar
timezone: Asia/Jakarta
collections:
  posts:
    title: Posts
    output: true
  uploads:
    title: Uploads
    output: true
defaults:
- scope:
    path: ''
    type: posts
  values:
    layout: post
    comments: true
    social-share: true
    readtime: false
- scope:
    path: ''
  values:
    layout: page
    show-avatar: true
description: Blog and random things
author: Sulaiman Gari
navbar-links:
  Blog: blog
  Projects: projects
  About Me: aboutme
social-network-links:
  email: sulaimangari97@gmail.com
  facebook: garisulaiman
  github: sulaimangari
  twitter: sulaiman_gari
  rss: true
share-links-active:
  twitter: true
  facebook: true
  linkedin: true
link-tags: true
excerpt_length: 50
navbar-col: "#f5f5f5"
navbar-text-col: "#404040"
navbar-border-col: "#EAEAEA"
page-col: "#ffffff"
link-col: "#008AFF"
hover-col: "#0085A1"
footer-col: "#f5f5f5"
footer-text-col: "#777777"
footer-link-col: "#404040"
title-separator: "-"
date_format: "%B %-d, %Y"
markdown: kramdown
highlighter: rouge
permalink: "/:year-:month-:day-:title/"
paginate: 5
kramdown:
  input: GFM
exclude:
- CHANGELOG.md
- CNAME
- Gemfile
- Gemfile.lock
- LICENSE
- README.md
- screenshot.png
- docs/
plugins:
- jekyll-paginate
- jekyll-sitemap
paginate_path: "/blog/page:num/"
